name: Backend Continuous Integration

on:
  push:
    branches: [main, deploy/production]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/secret-notes-backend

jobs:
  # Stage 1: Linting - static analysis + dependency/security scan
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies securely
        run: npm ci
      - name: ESLint
        run: npm run lint
      - name: SonarQube scan
        uses: sonarsource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      - name: Snyk security scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --severity-threshold=high
      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {"text": "Backend CI failed at *lint* stage on ${{ github.ref_name }} (${{ github.sha }}) - <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|view run>"}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # Stage 2: Unit testing with coverage (Jest, 10+ tests)
  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies securely
        run: npm ci
      - name: Run unit tests with coverage
        run: npm test
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage
      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {"text": "Backend CI failed at *test* stage on ${{ github.ref_name }} (${{ github.sha }}) - <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|view run>"}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # Stage 3: Build Docker image
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image (not pushed yet, just verified + saved)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: secret-notes-backend:${{ github.sha }}
          outputs: type=docker,dest=/tmp/backend-image.tar
      - name: Save image as artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-image
          path: /tmp/backend-image.tar
          retention-days: 1
      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {"text": "Backend CI failed at *build* stage on ${{ github.ref_name }} (${{ github.sha }}) - <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|view run>"}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # Stage 4: Deliver - push to Docker Hub (deploy/production only)
  deliver:
    needs: build
    if: github.ref == 'refs/heads/deploy/production'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: backend-image
          path: /tmp
      - name: Load image
        run: docker load -i /tmp/backend-image.tar
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Tag and push
        run: |
          docker tag secret-notes-backend:${{ github.sha }} ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker tag secret-notes-backend:${{ github.sha }} ${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:latest
      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {"text": "Backend CI failed at *deliver* stage on ${{ github.ref_name }} (${{ github.sha }}) - <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|view run>"}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

