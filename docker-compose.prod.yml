services:
  backend-blue:
    image: armandveress/ci-secret-notes-backend:latest
    restart: unless-stopped
    env_file: ./.env
    ports:
      - "3001:3000"
    networks:
      default: {}
      blue-net:
        aliases:
          - backend

  backend-green:
    image: armandveress/ci-secret-notes-backend:latest
    restart: unless-stopped
    env_file: ./.env
    ports:
      - "3002:3000"
    networks:
      default: {}
      green-net:
        aliases:
          - backend

  frontend-blue:
    image: armandveress/ci-secret-notes-frontend:latest
    restart: unless-stopped
    ports:
      - "8081:80"
    networks:
      - default
      - blue-net

  frontend-green:
    image: armandveress/ci-secret-notes-frontend:latest
    restart: unless-stopped
    ports:
      - "8082:80"
    networks:
      - default
      - green-net

  lb:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - backend-blue
      - backend-green
      - frontend-blue
      - frontend-green
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx:/etc/nginx/active:ro
    networks:
      - default

networks:
  default:
  blue-net:
  green-net: