events {
  worker_connections 1024;
}

http {
  # active-upstream.conf is a symlink maintained by deploy/switch-blue-green.sh,
  # pointing at either upstream-blue.conf or upstream-green.conf.
  include /etc/nginx/active/active-upstream.conf;

  server {
    listen 80;

    location /api/ {
      proxy_pass http://backend_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
      proxy_pass http://frontend_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}