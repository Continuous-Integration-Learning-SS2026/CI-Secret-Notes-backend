# Self-hosted CI/code-quality tooling for the EC2 instance, run alongside
# docker-compose.prod.yml (the app itself). Kept in a separate file so you
# can bring tooling up/down independently of the app's blue/green stack.
#
# Sized for m7i-flex.large (8GiB RAM) - comfortable defaults. SonarQube gets
# its own Postgres so analysis history persists cleanly and isn't sharing the
# app's RDS instance.
#
# Before first `docker compose -f docker-compose.tooling.yml up -d`, the HOST
# needs vm.max_map_count raised for SonarQube's embedded Elasticsearch - see
# deploy/ec2-setup.sh, which sets this persistently.
services:
  jenkins:
    image: jenkins/jenkins:lts-jdk17
    restart: unless-stopped
    user: root # simplest way to let the Jenkins container drive the host's Docker daemon
    ports:
      - "8080:8080" # Jenkins UI - restrict this in the EC2 security group to your IP only
      - "50000:50000" # agent port, only needed if you attach external build agents later
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker:ro

  sonarqube:
    image: sonarqube:lts-community
    restart: unless-stopped
    depends_on:
      - sonarqube-db
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonarqube
      SONAR_JDBC_PASSWORD: ${SONARQUBE_DB_PASSWORD:-sonarqube}
    ports:
      - "9000:9000" # SonarQube UI - restrict this in the EC2 security group to your IP only
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    ulimits:
      nofile:
        soft: 131072
        hard: 131072
      nproc: 8192

  sonarqube-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: sonarqube
      POSTGRES_PASSWORD: ${SONARQUBE_DB_PASSWORD:-sonarqube}
      POSTGRES_DB: sonarqube
    volumes:
      - sonarqube_db_data:/var/lib/postgresql/data

volumes:
  jenkins_home:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  sonarqube_db_data: